name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # -----------------------------------------------------------------------
  # Lint & import check
  # -----------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install ruff
      - name: Run ruff
        run: ruff check cli/ core/ parser/ installer/ validator/ index/

  # -----------------------------------------------------------------------
  # Unit tests across Python versions
  # -----------------------------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run verification suite
        run: python _verify.py

  # -----------------------------------------------------------------------
  # Package validation
  # -----------------------------------------------------------------------
  validate:
    name: Validate packages
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -e .
      - name: Validate all packages
        run: raiku validate --all --strict --dir .
      - name: Check index integrity
        run: raiku index --check --root .

  # -----------------------------------------------------------------------
  # CLI smoke test
  # -----------------------------------------------------------------------
  smoke:
    name: CLI smoke test
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -e .

      - name: raiku --version
        run: raiku --version

      - name: raiku --help
        run: raiku --help

      - name: raiku doctor
        run: raiku doctor

      - name: raiku index --stats
        run: raiku index --stats --root .

      - name: raiku search math (uses local index)
        run: |
          cp index/index.json ~/.raiku/index.json 2>/dev/null || true
          mkdir -p ~/.raiku
          cp index/index.json ~/.raiku/index.json
          python -c "
          import json, time, pathlib
          p = pathlib.Path.home() / '.raiku' / 'index.json'
          d = json.loads(p.read_text())
          d['_synced_at'] = int(time.time())
          p.write_text(json.dumps(d))
          "
          raiku search math
